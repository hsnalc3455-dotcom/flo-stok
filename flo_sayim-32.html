<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>FLO STOK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#FF6000;--accent2:#ff8c42;--danger:#ff3b3b;--ok:#22c55e;--warn:#f59e0b;--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--text:#f0f0f0;--muted:#666;--border:#2a2a2a}
body{background:var(--bg);font-family:'DM Sans',Arial,sans-serif;padding-bottom:100px;color:var(--text)}
header{background:linear-gradient(135deg,#FF6000,#cc3d00);padding:16px 20px 14px;position:sticky;top:0;z-index:20;box-shadow:0 4px 24px rgba(255,96,0,.5)}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:6px;color:#fff;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.header-right{text-align:right}
.header-sub{font-size:10px;color:rgba(255,255,255,.75);letter-spacing:3px;text-transform:uppercase}
.kirik-badge{display:none;background:#fff;color:var(--danger);font-size:11px;font-weight:700;padding:3px 12px;border-radius:50px;margin-top:5px;animation:yanip 1s infinite}
@keyframes yanip{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:76px;z-index:19}
.tab{flex:1;padding:14px 8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.a{color:var(--accent);border-bottom-color:var(--accent)}
.pg{display:none}.pg.a{display:block}
.ia{padding:18px 16px 12px}
.ir{display:flex;gap:10px;margin-bottom:12px}
.bi{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:16px;color:var(--text);font-size:17px;padding:15px 18px;outline:none;transition:all .2s}
.bi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,96,0,.15)}
.eb{background:linear-gradient(135deg,#FF6000,#cc3d00);border:none;border-radius:16px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;padding:15px 24px;cursor:pointer;box-shadow:0 4px 16px rgba(255,96,0,.4);transition:transform .1s}
.eb:active{transform:scale(.95)}
.kamera-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:rgba(255,96,0,.1);border:2px solid var(--accent);border-radius:16px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:19px;padding:13px;cursor:pointer;margin-bottom:12px;transition:background .2s}
.kamera-btn:active{background:rgba(255,96,0,.2)}
.sinir-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-radius:12px;padding:10px 16px;border:1px solid var(--border)}
.sinir-row label{font-size:13px;color:var(--muted)}
.sinir-row input{width:52px;background:var(--bg);border:2px solid var(--border);border-radius:8px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center;padding:4px;outline:none}
.stats{display:flex;gap:10px;padding:14px 16px}
.stat{flex:1;background:var(--surface);border-radius:16px;padding:14px 10px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat.g::after{background:var(--ok)}
.stat.r::after{background:var(--danger)}
.sn{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1}
.stat.r .sn{color:var(--danger)}
.stat.g .sn{color:var(--ok)}
.sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.list-wrap{padding:0 16px}
.card{background:var(--surface);border-radius:20px;overflow:hidden;border:1.5px solid var(--border);margin-bottom:12px;animation:slideIn .3s ease;transition:border-color .3s}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card.kirik{border-color:var(--danger);animation:slideIn .3s ease,kirpma 2s infinite .5s}
@keyframes kirpma{0%,100%{border-color:var(--danger)}50%{border-color:#ff8888;box-shadow:0 0 12px rgba(255,59,59,.3)}}
.card-stripe{height:5px;background:linear-gradient(90deg,var(--ok),#4ade80)}
.card.kirik .card-stripe{background:linear-gradient(90deg,var(--danger),#ff8888)}
.card-body{padding:16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-left{flex:1;min-width:0}
.brand-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.brand-dot{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#cc3d00);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 3px 10px rgba(255,96,0,.3)}
.card.kirik .brand-dot{background:linear-gradient(135deg,var(--danger),#b91c1c);box-shadow:0 3px 10px rgba(255,59,59,.3)}
.brand-name{font-size:15px;font-weight:700;color:var(--text)}
.model-name{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;padding-left:50px;margin-top:-2px}
.generic-no{font-size:10px;color:#444;padding-left:50px;margin-top:1px}
.card-right{text-align:center;flex-shrink:0}
.toplam-no{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--ok)}
.card.kirik .toplam-no{color:var(--danger)}
.toplam-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.firsat-tag{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;font-size:12px;font-weight:700;padding:5px 14px;border-radius:50px;margin-top:8px;animation:tag-bounce .5s ease}
@keyframes tag-bounce{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.bedenler{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.bd{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;min-width:60px}
.bd.yok{opacity:.25}
.bd-no{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:var(--text)}
.bd-stok{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
.firsat-hero{background:linear-gradient(135deg,#f59e0b,#ef4444);padding:24px 20px;text-align:center;color:#fff}
.firsat-hero h2{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:3px}
.firsat-hero p{font-size:13px;opacity:.9;margin-top:5px}
.firsat-bos{text-align:center;color:var(--muted);padding:60px 20px}
.firsat-bos span{display:block;font-size:50px;margin-bottom:12px}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.empty span{display:block;font-size:50px;margin-bottom:12px}
.rb{display:block;margin:8px auto 0;background:none;border:2px solid var(--border);border-radius:50px;color:var(--muted);font-size:13px;padding:10px 28px;cursor:pointer}
.kmodal{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column}
.kmodal.ac{display:flex}
.kmodal-header{background:var(--accent);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kmodal-baslik{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;letter-spacing:2px}
.kmodal-kapat{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer}
#kvideo-wrap{flex:1;position:relative;overflow:hidden}
#kvideo{width:100%;height:100%;object-fit:cover;display:block}
#kcanvas{position:absolute;top:0;left:0;width:100%;height:100%;display:none}
.cerceve{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:280px;height:160px;border:3px solid var(--accent);border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,.6);z-index:2;pointer-events:none}
.cerceve-cizgi{position:absolute;left:0;right:0;height:2px;background:var(--accent);animation:scan 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--accent)}
@keyframes scan{0%,100%{top:5%}50%{top:90%}}
.kmodal-alt{background:#0a0a0a;padding:16px;text-align:center;flex-shrink:0}
.kmodal-ipucu{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:4px}
.kmodal-son{color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:18px;min-height:24px}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:12px 28px;border-radius:50px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.4)}
#toast.s{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:linear-gradient(135deg,#16a34a,#15803d)}
#toast.er{background:linear-gradient(135deg,#e02020,#b91c1c)}
#toast.wn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
</style>
</head>

function playSound(firsat){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(firsat){
      [880,660,440].forEach(function(freq,i){
        var osc=audioCtx.createOscillator();

        osc.connect(gain);gain.connect(audioCtx.destination);

        gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+i*0.12+0.1);

        osc.stop(audioCtx.currentTime+i*0.12+0.1);
      });
    } else {
      var osc=audioCtx.createOscillator();

      osc.frequency.setValueAtTime(520,audioCtx.currentTime);
      gain.gain.setValueAtTime(0.15,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.12);

}

  var d=document.createElement('div');
  d.className='card'+(bad?' kirik':'');
  d.innerHTML='<div class="card-stripe"></div><div class="card-body"><div class="card-top"><div class="card-left"><div class="brand-row"><div class="brand-dot">'+ini+'</div><div class="brand-name">'+info.marka+'</div></div><div class="model-name">'+info.ad.substring(0,40)+'</div><div class="generic-no">Generic: '+g+'</div>'+(bad?'<div class="firsat-tag">🏷️ FIRSAT — '+t+' adet kaldi</div>':'')+'</div><div class="card-right"><div class="toplam-no">'+t+'</div><div class="toplam-lbl">adet</div></div></div><div class="bedenler">'+bh+'</div></div>';
  return d;
}
function rList(id,gs,isFi){
  var el=document.getElementById(id);
  if(!gs.length){el.innerHTML=isFi?'<div class="firsat-bos"><span>✅</span><p>Firsat urun yok</p></div>':'<div class="empty"><span>📦</span><p>Henuz urun eklenmedi</p></div>';return;}
  el.innerHTML='';gs.forEach(function(g){var d=makeCard(g);if(d)el.appendChild(d);});
}
function resetAll(){if(!confirm('Tum veriler silinsin mi?'))return;C={};kaydet();render();}
function goTab(id,el){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('a');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('a');});
  document.getElementById('pg-'+id).classList.add('a');el.classList.add('a');
  if(id==='tum')document.getElementById('bi').focus();
}
var html5QrCode=null;
function kameraAc(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(isIOS){
    // iOS için file input kullan
    document.getElementById('ios-capture').click();
    return;
  }
  document.getElementById('kmodal').classList.add('ac');
  document.getElementById('kson').textContent='Kamera aciliyor...';
  taramaAktif=true;
  var sonKod='';var bekle=false;
  html5QrCode=new Html5Qrcode('kvideo-wrap');
  html5QrCode.start(
    {facingMode:'environment'},
    {fps:15,qrbox:{width:280,height:160},aspectRatio:1.7},
    function(kod){
      if(!bekle&&kod!==sonKod){
        sonKod=kod;bekle=true;
        document.getElementById('kson').textContent=kod;
        if(navigator.vibrate)navigator.vibrate(80);
        ekle(kod);
        setTimeout(function(){bekle=false;sonKod='';},1000);
      }
    },
    function(err){}
  ).then(function(){
    document.getElementById('kson').textContent='Bekleniyor...';
  }).catch(function(){
    document.getElementById('kson').textContent='Kamera acilamadi!';
  });
}

function iosBarkodOku(input){
  if(!input.files||!input.files[0]) return;
  var file=input.files[0];
  toast('Goruntu isleniyor...','wn');
  var qr=new Html5Qrcode('ios-qr-reader');
  Html5Qrcode.scanFile(file,true).then(function(kod){
    ekle(kod);
    toast('Okundu: '+kod,'ok');
  }).catch(function(){
    toast('Barkod okunamadi, tekrar dene!','wn');
  });
  input.value='';
}

function kameraKapat(){
  taramaAktif=false;
  if(html5QrCode){
    html5QrCode.stop().then(function(){
      html5QrCode.clear();
      html5QrCode=null;
    }).catch(function(){});
  }
  document.getElementById('kmodal').classList.remove('ac');
}
var tt;
function toast(msg,typ){var t=document.getElementById('toast');t.textContent=msg;t.className='s '+typ;clearTimeout(tt);tt=setTimeout(function(){t.className='';},2500);}
render();
</script>
